name: 手動テスト

on:
  pull_request:
    branches:
      - main
    paths:
      - 'envs/test/**'
  push:
    branches:
      - main
    paths:
      - 'envs/test/**'
  workflow_dispatch:
    inputs:
      reason:
        description: "手動実行理由"
        required: true
        type: string
      job_type:
        description: "実行するジョブ (plan: 差分確認のみ / apply: インフラ反映)"
        required: true
        default: "apply"
        type: choice
        options:
          - plan
          - apply

jobs:
  plan:
    runs-on: ubuntu-latest
    if: |
      ${{
        github.event_name == 'pull_request' ||
        (github.event_name == 'workflow_dispatch' && inputs.job_type == 'plan')
      }}
    steps:
      - uses: actions/checkout@v4
      - name:  実行ログの記録
        run: |
          echo "==== ワークフロー実行情報 ===="
          echo "実行イベント: ${{ github.event_name }}"
          echo "実行した人: ${{ github.actor }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "手動実行理由: ${{ inputs.reason }}"
            echo "選択ジョブ: ${{ inputs.job_type }}"
          fi
          echo "=============================="
      - name: "Run linter #${{ github.run_number }} - 理由: ${{ inputs.reason || '自動実行' }}"
        run: echo "plan test"


  apply:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.job_type == 'apply')
    steps:
      - uses: actions/checkout@v4
      - name: Run linter
        run: echo "apply test"

