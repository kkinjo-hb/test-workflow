name: Secrets Test

on:
  push:
    branches:
      - main  # またはテストしているブランチ名

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Check if secrets are loaded
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "❌ ERROR: AWS_ACCESS_KEY_ID が空っぽです！登録場所か名前が間違っています。"
            exit 1
          else
            echo "✅ SUCCESS: シークレットは正しく読み込まれています！"
          fi
